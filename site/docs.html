<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docs — IVG Toolkit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/site.css?v=6" />
  <style>
    .doc-nav {
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      background: var(--bg-alt); padding: 16px 40px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 20;
    }
    .doc-nav .l { display: flex; align-items: center; gap: 11px; }
    .doc-nav .mark {
      width: 28px; height: 28px; border-radius: 8px; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
    }
    .doc-nav .mark .lucide { width: 15px; height: 15px; color: #fff; }
    .doc-nav .brand { font-family: var(--font-display); font-size: 16px; font-weight: 600; }
    .doc-nav .ver {
      font-family: var(--font-mono); font-size: 10.5px; color: var(--text-secondary);
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 5px; padding: 3px 7px;
    }
    .doc-nav .r { display: flex; align-items: center; gap: 26px; }
    .doc-nav .r a { font-size: 14px; color: var(--text-secondary); }
    .doc-nav .r a.on { color: var(--text-primary); font-weight: 600; }
    .doc-nav .r a:hover { color: var(--text-primary); }
    .doc-nav .dl-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent); color: #fff !important;
      border-radius: 9px; padding: 9px 16px; font-size: 13.5px; font-weight: 600;
    }
    .doc-nav .dl-btn .lucide { width: 15px; height: 15px; }

    .doc-shell { display: flex; min-height: calc(100vh - 66px); }
    .doc-side {
      width: 262px; flex: none;
      background: var(--bg-alt);
      border-right: 1px solid var(--border);
      padding: 26px 20px;
      display: flex; flex-direction: column; gap: 4px;
      position: sticky; top: 66px; height: calc(100vh - 66px); overflow-y: auto;
    }
    .doc-side .search {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 11px; margin-bottom: 14px;
    }
    .doc-side .search .lucide { width: 13px; height: 13px; color: var(--text-muted); }
    .doc-side .search input {
      border: none; background: none; outline: none; width: 100%;
      font-family: var(--font-body); font-size: 13px; color: var(--text-primary);
    }
    .doc-side .search input::placeholder { color: var(--text-muted); }
    .doc-side .grp {
      font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 1px; color: var(--text-muted);
      padding: 14px 0 6px 2px;
    }
    .doc-side a {
      display: flex; align-items: center; gap: 9px;
      border-radius: 7px; padding: 8px 11px;
      font-size: 13.5px; color: var(--text-secondary);
    }
    .doc-side a:hover { background: #ffffff08; }
    .doc-side a.on { background: var(--accent-soft); color: var(--text-primary); font-weight: 600; }
    .doc-side a img { width: 32px; height: 32px; object-fit: contain; }
    .doc-side a .lucide { width: 30px; height: 30px; color: var(--text-muted); }

    .doc-article { flex: 1; min-width: 0; padding: 44px 64px; max-width: 900px; }
    .doc-bc {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font-mono); font-size: 12px; color: var(--text-muted);
      margin-bottom: 18px;
    }
    .doc-bc b { color: var(--accent-text); font-weight: 400; }
    .doc-article h1 {
      font-family: var(--font-display); font-size: 42px; font-weight: 600; letter-spacing: -1px;
      margin: 0 0 14px;
    }
    .doc-badges { display: flex; gap: 8px; margin-bottom: 22px; flex-wrap: wrap; }
    .md { color: var(--text-secondary); font-size: 15px; line-height: 1.7; }
    .md > p:first-of-type { font-size: 17px; line-height: 1.6; }
    .md h2 {
      display: flex; align-items: center; gap: 9px;
      font-family: var(--font-display); font-size: 22px; font-weight: 600; color: var(--text-primary);
      margin: 40px 0 14px; padding-top: 26px;
      border-top: 1px solid var(--border-soft);
    }
    .md h3 {
      font-family: var(--font-display); font-size: 16.5px; font-weight: 600; color: var(--text-primary);
      margin: 26px 0 10px;
    }
    .md p { margin: 0 0 14px; }
    .md ul, .md ol { margin: 0 0 16px; padding-left: 22px; display: flex; flex-direction: column; gap: 7px; }
    .md li::marker { color: var(--accent-text); }
    .md code {
      font-family: var(--font-mono); font-size: .86em; color: var(--accent-text);
      background: var(--term-bg); border: 1px solid var(--border-soft);
      border-radius: 5px; padding: 1.5px 6px;
    }
    .md pre {
      background: var(--term-bg); border: 1px solid var(--border-soft); border-radius: 10px;
      padding: 14px 16px; overflow-x: auto; margin: 0 0 16px;
    }
    .md pre code { background: none; border: none; padding: 0; font-size: 12.5px; line-height: 1.6; }
    .md blockquote {
      border-left: 3px solid var(--accent); border-radius: 2px;
      padding: 2px 0 2px 16px; margin: 0 0 16px;
      color: var(--text-secondary); font-size: 16px;
    }
    .md table { width: 100%; border-collapse: collapse; margin: 0 0 18px; font-size: 13.5px; }
    .md th {
      text-align: left; font-family: var(--font-mono); font-size: 11px; letter-spacing: .8px;
      color: var(--text-muted); font-weight: 500; text-transform: uppercase;
      padding: 8px 12px; border-bottom: 1px solid var(--border);
    }
    .md td { padding: 9px 12px; border-bottom: 1px solid var(--border-soft); vertical-align: top; }
    .md td:first-child { color: var(--text-primary); white-space: nowrap; }
    .md strong { color: var(--text-primary); font-weight: 600; }
    .md hr { border: none; border-top: 1px solid var(--border-soft); margin: 24px 0; }

    .doc-dl {
      display: flex; align-items: center; justify-content: space-between; gap: 14px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 20px; margin-top: 36px;
    }
    .doc-dl .t { font-family: var(--font-display); font-size: 16px; font-weight: 600; color: var(--text-primary); }
    .doc-dl .s { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
    .doc-dl .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .doc-dl .a1 {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent); color: #fff; border-radius: 9px; padding: 10px 16px;
      font-size: 13.5px; font-weight: 600;
    }
    .doc-dl .a2 {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--surface-2); color: var(--text-primary); border: 1px solid var(--border);
      border-radius: 9px; padding: 10px 16px; font-size: 13.5px; font-weight: 500;
    }
    .doc-dl .lucide { width: 15px; height: 15px; }

    .doc-toc {
      width: 222px; flex: none;
      border-left: 1px solid var(--border);
      padding: 44px 24px;
      position: sticky; top: 66px; height: calc(100vh - 66px); overflow-y: auto;
      display: flex; flex-direction: column; gap: 13px;
    }
    .doc-toc .h { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 1px; color: var(--text-muted); }
    .doc-toc a { font-size: 13px; color: var(--text-muted); }
    .doc-toc a:hover { color: var(--text-secondary); }
    .doc-toc a.on { color: var(--accent-text); }

    @media (max-width: 1100px) { .doc-toc { display: none; } }
    @media (max-width: 860px) {
      .doc-side { display: none; }
      .doc-article { padding: 32px 24px; }
      .doc-nav { padding: 14px 20px; }
      .doc-nav .r a:not(.dl-btn) { display: none; }
    }
  </style>
</head>
<body>
  <nav class="doc-nav">
    <a class="l" href="index.html">
      <span class="mark"><i data-lucide="zap"></i></span>
      <span class="brand">IVG Toolkit</span>
      <span class="ver">v1.0</span>
    </a>
    <div class="r">
      <a href="index.html#library">Library</a>
      <a href="#" class="on">Docs</a>
      <a href="https://github.com/ivg-design/ae/blob/main/CHANGELOG.md" target="_blank" rel="noopener">Changelog</a>
      <a href="https://github.com/ivg-design/ae" target="_blank" rel="noopener">GitHub</a>
      <a class="dl-btn" href="download/ae-scripts.zip" download><i data-lucide="download"></i>Download</a>
    </div>
  </nav>

  <div class="doc-shell">
    <aside class="doc-side" id="docSide">
      <label class="search"><i data-lucide="search"></i><input id="docSearch" type="search" placeholder="Filter scripts…" /></label>
    </aside>
    <main class="doc-article" id="docArticle">
      <div class="doc-bc" id="docBc"></div>
      <h1 id="docH1">Loading…</h1>
      <div class="doc-badges" id="docBadges"></div>
      <div class="md" id="docMd"></div>
      <div class="doc-dl" id="docDl" hidden>
        <div>
          <div class="t" id="dlT"></div>
          <div class="s" id="dlS"></div>
        </div>
        <div class="actions">
          <a class="a1" id="dlBtn" href="#" download><i data-lucide="download"></i>Download .jsx</a>
          <a class="a2" href="https://github.com/ivg-design/ae" target="_blank" rel="noopener"><i data-lucide="github"></i>View source</a>
        </div>
      </div>
    </main>
    <aside class="doc-toc" id="docToc">
      <span class="h">ON THIS PAGE</span>
    </aside>
  </div>

  <div class="toast" id="toast" role="status"></div>
  <script src="vendor/lucide.min.js"></script>
  <script src="js/docs.js?v=6"></script>
</body>
</html>
