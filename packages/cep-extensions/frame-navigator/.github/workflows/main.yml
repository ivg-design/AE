name: ZXP Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Build ZXP package
        run: yarn zxp

      - name: GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_NAME: ${{ steps.extract_names.outputs.SOURCE_NAME }}
          SOURCE_BRANCH: ${{ steps.extract_names.outputs.SOURCE_BRANCH }}
          SOURCE_TAG: ${{ steps.extract_names.outputs.SOURCE_TAG }}
        with:
          files: ./dist/zxp/com.bolt.cep.zxp
